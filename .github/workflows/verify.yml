name: PR Verifier
on:
  pull_request_target:
    types: [opened, edited, reopened]
permissions: read-all

jobs:
  verify:
    permissions:
      checks: write
    name: Verify PR contents
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
      with:
        egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

    # Checkout the base branch (target of the PR) to ensure we run trusted code
    # Never checkout the PR branch in pull_request_target to avoid code injection
    - name: Checkout base branch
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.base_ref }}

    - name: Verify PR title
      id: verifier
      env:
        # Pass PR title as environment variable to avoid shell injection
        PR_TITLE: ${{ github.event.pull_request.title }}
      run: |
        ./scripts/verify-pr-title.sh "$PR_TITLE"
